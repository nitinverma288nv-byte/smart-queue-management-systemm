# ===============================
# SERVER CONFIG
# ===============================
# suppress inspection
server.port=9999

# ===============================
# DATABASE CONFIG
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/Queue_DB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT SETTINGS
# ===============================

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250655368566D5971
